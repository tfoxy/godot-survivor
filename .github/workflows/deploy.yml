name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot & Templates
        env:
          GODOT_VERSION: 4.6.1
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          godot --version

      - name: Create export directory
        run: mkdir -p dist

      - name: Export Web
        run: godot --headless --export-release "Web" dist/index.html

      - name: Cache-bust asset URLs in index.html
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Append ?v=<sha> to JS, WASM, and PCK references so browsers always
          # fetch the latest files instead of serving a stale cached version.
          sed -i \
            -e "s|\"index\.js\"|\"index.js?v=${SHORT_SHA}\"|g" \
            -e "s|src=\"index\.js\"|src=\"index.js?v=${SHORT_SHA}\"|g" \
            -e "s|\"index\.wasm\"|\"index.wasm?v=${SHORT_SHA}\"|g" \
            -e "s|\"index\.pck\"|\"index.pck?v=${SHORT_SHA}\"|g" \
            dist/index.html

      - name: Add no-cache headers for index.html
        run: |
          # GitHub Pages respects a _headers file (Netlify-style headers are NOT
          # natively supported, but the no-store meta tag below is the reliable
          # cross-platform fallback). We also inject a <meta> tag into index.html
          # so the browser always revalidates it on revisit.
          sed -i 's|<meta charset="utf-8">|<meta charset="utf-8">\n\t\t<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">\n\t\t<meta http-equiv="Pragma" content="no-cache">\n\t\t<meta http-equiv="Expires" content="0">|' dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
